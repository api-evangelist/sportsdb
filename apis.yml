aid: sportsdb
url: https://raw.githubusercontent.com/api-evangelist/sportsdb/refs/heads/main/apis.yml
name: TheSportsDB
kind: company
description: TheSportsDB is an open, crowd-sourced database of sports artwork and
  metadata with a free REST API in JSON. It provides data on leagues, teams, players,
  events, venues, schedules, and season standings across soccer, basketball, baseball,
  American football, hockey, tennis, and many other sports worldwide, with premium
  V2 livescores and video highlights for supporters.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Sports
